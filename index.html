<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upfront Nutrition Dashboard</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Upfront Nutrition Dashboard</h1>
      <p>
        This dashboard compares nutritional values of different Upfront bars.
        The first version shows protein per flavor.
      </p>
    </header>
    <a href="3d.html" class="three-d-link">Open 3D Visualization</a>

    <div class="scroll-hint" aria-hidden="true">
      <span class="scroll-hint-label">Scroll down for charts and gallery</span>
      <span class="scroll-hint-arrow" title="Scroll down"></span>
    </div>

    <section class="chart-section">
      <div class="chart-header">
        <div>
          <h2>Nutrition per Flavor</h2>
          <p id="topProduct"></p>
        </div>
    
        <div class="filters">
          <select id="metricSelect">
            <option value="protein_g">Protein</option>
            <option value="sugar_g">Sugar</option>
            <option value="calories_kcal">Calories</option>
          </select>
    
          <select id="categorySelect">
            <option value="all">All Categories</option>
            <option value="Eiwitreep">Eiwitreep</option>
            <option value="Eiwitcrisp">Eiwitcrisp</option>
            <option value="Choco Eiwitreep">Choco Eiwitreep</option>
            <option value="Granola Reep">Granola Reep</option>
            <option value="Endurance Bar">Endurance Bar</option>
            <option value="Eiwitreep Crispy">Eiwitreep Crispy</option>
          </select>
    
          <select id="sortSelect">
            <option value="default">Default Order</option>
            <option value="highToLow">Highest to Lowest</option>
            <option value="lowToHigh">Lowest to Highest</option>
          </select>
        </div>
      </div>
    
      <div class="chart-box">
        <canvas id="nutritionChart"></canvas>
      </div>
      <div id="chartColorLegend" class="chart-color-legend" aria-live="polite"></div>
    </section>

    <section class="gallery-section">
      <h2>Product Gallery</h2>
      <div id="productGallery" class="gallery"></div>
    </section>
  </div>

  <div id="comparisonModal" class="comparison-modal">
    <div class="comparison-modal-content">
      <button type="button" id="closeComparisonModal" class="close-modal" aria-label="Close comparison">&times;</button>
      <div id="comparisonModalBody"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
